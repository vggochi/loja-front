<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - B7Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans flex min-h-screen items-center justify-center p-6">

    <div class="w-full max-w-md rounded-3xl bg-white p-8 shadow-sm border border-slate-100">
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-bold tracking-tight text-slate-900">B7Store<span class="text-slate-400">.</span></h1>
            <p class="mt-2 text-sm text-slate-500">Crie sua conta</p>
        </div>

        <form id="register-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Nome completo</label>
                <input type="text" id="nome" required
                    class="w-full rounded-2xl border border-slate-200 bg-slate-50 p-3.5 text-sm outline-none focus:border-slate-400">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">E-mail</label>
                <input type="email" id="email" required
                    class="w-full rounded-2xl border border-slate-200 bg-slate-50 p-3.5 text-sm outline-none focus:border-slate-400">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
                <input type="password" id="senha" required
                    class="w-full rounded-2xl border border-slate-200 bg-slate-50 p-3.5 text-sm outline-none focus:border-slate-400">
            </div>

            <button type="submit" 
                class="w-full rounded-2xl bg-slate-950 p-4 text-sm font-semibold text-white transition hover:bg-slate-800">
                Criar minha conta
            </button>
        </form>
        
        <div class="mt-4 text-center">
            <a href="login-cliente.html" class="text-sm text-slate-500 hover:underline">Já tenho conta →</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://loja-back-eight.vercel.app/";
        
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const dados = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                senha: document.getElementById('senha').value
            };
            
            if (!dados.nome || !dados.email || !dados.senha) {
                alert('⚠️ Preencha todos os campos obrigatórios!');
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/clientes/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
                
                const resposta = await res.json();
                
                if (!res.ok) {
                    alert(resposta.mensagem || 'Erro ao cadastrar');
                    return;
                }
                
                localStorage.setItem('cliente_token', resposta.token);
                localStorage.setItem('cliente_nome', resposta.cliente.nome);
                alert('✅ Conta criada com sucesso!');
                window.location.href = 'index.html';
            } catch (err) {
                console.error('Erro:', err);
                alert('❌ Erro de conexão. Tente novamente.');
            }
        });
    </script>
</body>
</html>
