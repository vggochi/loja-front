<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B7Store - Detalhes do Produto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <header class="bg-white shadow-sm mb-10">
        <div class="mx-auto flex max-w-screen-xl items-center justify-between px-6 py-6">
            <a href="index.html" class="text-2xl font-bold">B7Store<span class="text-slate-400">.</span></a>
            <div class="flex gap-4">
                <span id="user-nome" class="text-sm text-slate-600"></span>
                <a href="login-cliente.html" id="btn-login" class="text-sm font-medium text-slate-600 hover:text-slate-900">Minha Conta</a>
                <button id="logout-btn" class="text-sm text-rose-600 hover:underline hidden">Sair</button>
            </div>
        </div>
    </header>

    <main id="detalhe-container" class="mx-auto max-w-screen-xl px-6 py-6">
        <div class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-slate-900 mb-4"></div>
            <p class="text-slate-400">Carregando detalhes do produto...</p>
        </div>
    </main>

    <script>
        const API_BASE_URL = "https://loja-back-eight.vercel.app";
        
        // Verificar login do cliente
        const token = localStorage.getItem('cliente_token');
        const nome = localStorage.getItem('cliente_nome');
        const btnLogin = document.getElementById('btn-login');
        const logoutBtn = document.getElementById('logout-btn');
        const userNome = document.getElementById('user-nome');
        
        if (token && nome) {
            btnLogin.classList.add('hidden');
            logoutBtn.classList.remove('hidden');
            userNome.innerHTML = `👤 ${nome}`;
        } else {
            btnLogin.classList.remove('hidden');
            logoutBtn.classList.add('hidden');
        }
        
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('cliente_token');
            localStorage.removeItem('cliente_nome');
            window.location.reload();
        });
        
        // Função para mostrar notificação
        function mostrarNotificacao(mensagem, tipo = 'sucesso') {
            const notificacao = document.createElement('div');
            notificacao.className = `fixed top-20 right-4 z-50 px-6 py-3 rounded-2xl shadow-lg text-white font-medium ${
                tipo === 'sucesso' ? 'bg-emerald-500' : 'bg-rose-500'
            } transition-opacity duration-300`;
            notificacao.textContent = mensagem;
            document.body.appendChild(notificacao);
            
            setTimeout(() => {
                notificacao.style.opacity = '0';
                setTimeout(() => notificacao.remove(), 300);
            }, 3000);
        }
        
        // Função para adicionar ao carrinho
        async function adicionarAoCarrinho(produtoId, produtoNome, quantidade = 1) {
            const token = localStorage.getItem('cliente_token');
            
            if (!token) {
                if (confirm('Você precisa estar logado para comprar. Deseja fazer login agora?')) {
                    window.location.href = 'login-cliente.html';
                }
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/clientes/carrinho`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ 
                        produto_id: produtoId,
                        quantidade: quantidade
                    })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    mostrarNotificacao(`✅ ${produtoNome} adicionado ao carrinho!`, 'sucesso');
                    
                    // Atualizar carrinho flutuante se existir
                    if (window.carrinhoFlutuante) {
                        await window.carrinhoFlutuante.carregarCarrinho();
                        window.carrinhoFlutuante.abrir();
                        setTimeout(() => window.carrinhoFlutuante.fechar(), 3000);
                    }
                } else {
                    mostrarNotificacao(data.mensagem || 'Erro ao adicionar', 'erro');
                }
            } catch (err) {
                console.error('Erro:', err);
                mostrarNotificacao('Erro de conexão. Tente novamente.', 'erro');
            }
        }
        
        // Pega o ID da URL
        const urlParams = new URLSearchParams(window.location.search);
        const produtoId = urlParams.get('id');
        
        console.log('ID do produto na URL:', produtoId);

        async function carregarDetalhes() {
            const container = document.getElementById('detalhe-container');
            
            if(!produtoId) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <div class="text-6xl mb-4">🔍</div>
                        <h2 class="text-2xl font-bold text-slate-800 mb-2">Produto não identificado</h2>
                        <p class="text-slate-500 mb-6">Não foi possível identificar qual produto você deseja ver.</p>
                        <a href="index.html" class="inline-block bg-slate-900 text-white px-6 py-3 rounded-2xl hover:bg-slate-800">
                            Voltar para loja
                        </a>
                    </div>
                `;
                return;
            }

            try {
                console.log(`Buscando produto na API: ${API_BASE_URL}/api/produtos/${produtoId}`);
                
                const res = await fetch(`${API_BASE_URL}/api/produtos/${produtoId}`);
                console.log('Status da resposta:', res.status);
                
                if (!res.ok) {
                    if (res.status === 404) {
                        throw new Error('Produto não encontrado');
                    }
                    throw new Error(`Erro ${res.status}`);
                }
                
                const prod = await res.json();
                console.log('Produto recebido:', prod);
                
                if (!prod || Object.keys(prod).length === 0) {
                    throw new Error('Produto vazio');
                }
                
                const preco = Number(prod.preco).toLocaleString('pt-BR', { 
                    style: 'currency', 
                    currency: 'BRL' 
                });

                container.innerHTML = `
                    <div class="grid grid-cols-1 gap-12 md:grid-cols-2 bg-white rounded-3xl p-8 border border-slate-100 shadow-sm">
                        <div class="overflow-hidden rounded-2xl bg-slate-50 h-96">
                            <img src="${prod.imagem_url || 'https://placehold.co/500x500?text=Sem+Imagem'}" 
                                 alt="${prod.nome}" 
                                 class="h-full w-full object-cover"
                                 onerror="this.src='https://placehold.co/500x500?text=Imagem+Indisponível'">
                        </div>
                        <div class="flex flex-col justify-between">
                            <div>
                                ${prod.info ? `<span class="inline-block bg-black text-white text-xs font-semibold px-2.5 py-1 rounded-xl mb-4">${prod.info}</span>` : ''}
                                <h2 class="text-3xl font-bold tracking-tight text-slate-900 mb-2">${prod.nome}</h2>
                                <p class="text-2xl font-bold text-slate-900 mb-6">${preco}</p>
                                <p class="text-sm text-slate-500 leading-relaxed">
                                    Produto de alta qualidade, disponível em nosso estoque. 
                                    Adquira já o seu!
                                </p>
                                <div class="mt-6 pt-6 border-t border-slate-100">
                                    <p class="text-sm text-slate-600">
                                        <span class="font-semibold">Código do produto:</span> #${prod.id}
                                    </p>
                                </div>
                                
                                <!-- Seletor de quantidade -->
                                <div class="mt-6">
                                    <label class="text-sm font-medium text-slate-700">Quantidade:</label>
                                    <div class="flex items-center gap-3 mt-2">
                                        <button id="diminuir-qtd" class="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 transition">-</button>
                                        <span id="quantidade" class="text-lg font-semibold w-12 text-center">1</span>
                                        <button id="aumentar-qtd" class="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 transition">+</button>
                                    </div>
                                </div>
                            </div>
                            <button id="btn-adicionar-carrinho" 
                                    data-produto-id="${prod.id}"
                                    data-produto-nome="${prod.nome}"
                                    class="mt-8 w-full rounded-2xl bg-slate-950 py-4 text-center font-semibold text-white hover:bg-slate-800 transition">
                                🛒 Adicionar ao Carrinho
                            </button>
                        </div>
                    </div>
                `;
                
                // Controles de quantidade
                let quantidade = 1;
                const qtdSpan = document.getElementById('quantidade');
                const btnDiminuir = document.getElementById('diminuir-qtd');
                const btnAumentar = document.getElementById('aumentar-qtd');
                const btnAdicionar = document.getElementById('btn-adicionar-carrinho');
                
                if (btnDiminuir) {
                    btnDiminuir.addEventListener('click', () => {
                        if (quantidade > 1) {
                            quantidade--;
                            qtdSpan.textContent = quantidade;
                        }
                    });
                }
                
                if (btnAumentar) {
                    btnAumentar.addEventListener('click', () => {
                        quantidade++;
                        qtdSpan.textContent = quantidade;
                    });
                }
                
                if (btnAdicionar) {
                    btnAdicionar.addEventListener('click', (e) => {
                        const produtoId = btnAdicionar.getAttribute('data-produto-id');
                        const produtoNome = btnAdicionar.getAttribute('data-produto-nome');
                        adicionarAoCarrinho(produtoId, produtoNome, quantidade);
                    });
                }
                
            } catch(e) {
                console.error('Erro completo:', e);
                container.innerHTML = `
                    <div class="text-center py-12">
                        <div class="text-6xl mb-4">😕</div>
                        <h2 class="text-2xl font-bold text-slate-800 mb-2">Produto não encontrado</h2>
                        <p class="text-slate-500 mb-6">O produto que você está procurando não existe ou foi removido.</p>
                        <a href="index.html" class="inline-block bg-slate-900 text-white px-6 py-3 rounded-2xl hover:bg-slate-800">
                            Ver outros produtos
                        </a>
                    </div>
                `;
            }
        }
        
        document.addEventListener("DOMContentLoaded", carregarDetalhes);
    </script>
    
    <!-- Carrinho flutuante -->
    <script src="carrinho-flutuante.js"></script>
</body>
</html>
